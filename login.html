<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | AllergyCare Clinic</title>
    <meta name="description" content="Login to your AllergyCare Clinic patient portal.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="icon" type="image/png" href="assets/images/logo.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/styles.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: { colors: { primary: { 50: '#f0f9ff', 100: '#e0f2fe', 200: '#bae6fd', 300: '#7dd3fc', 400: '#38bdf8', 500: '#0ea5e9', 600: '#0284c7', 700: '#0369a1', 800: '#075985', 900: '#0c4a6e' }, darkBg: '#0f172a', darkCard: '#1e293b' }, fontFamily: { sans: ['Inter', 'sans-serif'], heading: ['Outfit', 'sans-serif'] } }
            }
        }
    </script>
</head>

<body
    class="bg-slate-50 dark:bg-darkBg text-slate-800 dark:text-slate-200 transition-colors duration-300 font-sans antialiased overflow-x-hidden min-h-screen flex flex-col">

    <!-- Main Content -->
    <main class="flex-grow flex items-center justify-center p-4 sm:p-6 lg:p-8">
        <div class="max-w-xl w-full">
            <!-- Authentication Card -->
            <div
                class="bg-white dark:bg-darkCard rounded-[2rem] shadow-2xl border border-slate-100 dark:border-slate-800 p-6 sm:p-12 relative overflow-hidden backdrop-blur-xl bg-white/90 dark:bg-darkCard/90">

                <!-- Background Decoration -->
                <div class="absolute -top-24 -right-24 w-48 h-48 bg-primary-500/10 rounded-full blur-3xl"></div>
                <div class="absolute -bottom-24 -left-24 w-48 h-48 bg-emerald-500/10 rounded-full blur-3xl"></div>

                <!-- Card Header -->
                <div class="text-center mb-10 relative z-10">
                    <a href="index.html" class="inline-flex items-center gap-3 mb-6 group justify-center">
                        <img src="assets/images/logo.png" alt="AllergyCare Logo"
                            class="w-12 h-12 transition-transform group-hover:scale-110">
                        <span class="font-heading font-bold text-3xl text-slate-900 dark:text-white">Allergy<span
                                class="text-primary-600">Care</span></span>
                    </a>
                    <h1 class="font-heading text-4xl font-extrabold text-slate-900 dark:text-white mb-3">Welcome Back
                    </h1>
                    <p class="text-slate-500 dark:text-slate-400 text-lg">Sign in to manage your health.</p>
                </div>

                <!-- Theme Toggle (Inside Card) -->
                <button id="theme-toggle"
                    class="absolute top-6 right-6 p-3 rounded-2xl bg-slate-50 dark:bg-slate-800/50 hover:bg-slate-100 dark:hover:bg-slate-700 transition-all focus:outline-none border border-slate-200/50 dark:border-slate-700/50"
                    aria-label="Toggle Dark Mode">
                    <i id="theme-toggle-icon" class="fas fa-moon text-slate-700 dark:text-slate-300 text-xl"></i>
                </button>

                <!-- Form -->
                <form class="space-y-6 relative z-10" action="dashboard.html" method="GET">
                    <div class="space-y-2">
                        <label for="email"
                            class="block text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">Email
                            Address</label>
                        <div class="relative">
                            <i class="fas fa-envelope absolute left-5 top-1/2 -translate-y-1/2 text-slate-400"></i>
                            <input type="email" id="email"
                                class="w-full pl-12 pr-5 py-3.5 rounded-2xl border border-slate-200 dark:border-slate-700 bg-white/50 dark:bg-slate-900/50 text-slate-900 dark:text-white focus:ring-4 focus:ring-primary-500/20 focus:border-primary-500 transition-all placeholder:text-slate-400"
                                placeholder="john@example.com" required>
                        </div>
                    </div>

                    <div class="space-y-2">
                        <div class="flex items-center ml-1">
                            <label for="password"
                                class="block text-sm font-semibold text-slate-700 dark:text-slate-300">Password</label>
                        </div>
                        <div class="relative">
                            <i class="fas fa-lock absolute left-5 top-1/2 -translate-y-1/2 text-slate-400"></i>
                            <input type="password" id="password"
                                class="w-full pl-12 pr-5 py-3.5 rounded-2xl border border-slate-200 dark:border-slate-700 bg-white/50 dark:bg-slate-900/50 text-slate-900 dark:text-white focus:ring-4 focus:ring-primary-500/20 focus:border-primary-500 transition-all placeholder:text-slate-400"
                                placeholder="••••••••" required>
                        </div>
                    </div>

                    <div class="flex items-center justify-between ml-1 mt-6 gap-2 whitespace-nowrap">
                        <div class="flex items-center">
                            <input type="checkbox" id="terms-login"
                                class="w-4 h-4 text-primary-600 bg-gray-100 border-gray-300 rounded focus:ring-primary-500 dark:focus:ring-primary-600 dark:ring-offset-gray-800 focus:ring-2 dark:bg-gray-700 dark:border-gray-600"
                                required>
                            <label for="terms-login"
                                class="ml-2 text-xs font-medium text-slate-700 dark:text-slate-300">Remember me</label>
                        </div>
                        <a href="#"
                            class="text-[10px] font-bold text-primary-600 hover:text-primary-500 dark:text-primary-500 dark:hover:text-primary-400 hover:underline">Forgot
                            password?</a>
                    </div>

                    <div class="pt-4">
                        <button type="submit"
                            class="w-full bg-gradient-to-r from-primary-600 to-primary-700 hover:from-primary-700 hover:to-primary-800 text-white font-bold py-4 px-6 rounded-2xl transition-all shadow-xl shadow-primary-500/30 flex justify-center items-center gap-3 transform hover:scale-[1.02] active:scale-95">
                            Sign In <i class="fas fa-arrow-right"></i>
                        </button>
                    </div>

                    <div class="mt-6 flex flex-col items-center">
                        <span class="text-sm text-slate-500 dark:text-slate-400 mb-4 block">Or sign in with</span>
                        <div class="flex gap-4">
                            <a href="#"
                                class="w-10 h-10 rounded-full bg-slate-100 dark:bg-slate-800 flex items-center justify-center text-slate-600 dark:text-slate-300 hover:bg-primary-500 dark:hover:bg-primary-400 hover:text-white transition-colors border border-slate-200 dark:border-slate-700"
                                title="Sign in with Google"><i class="fab fa-google"></i></a>
                            <a href="#"
                                class="w-10 h-10 rounded-full bg-slate-100 dark:bg-slate-800 flex items-center justify-center text-slate-600 dark:text-slate-300 hover:bg-blue-600 dark:hover:bg-blue-500 hover:text-white transition-colors border border-slate-200 dark:border-slate-700"
                                title="Sign in with Facebook"><i class="fab fa-facebook-f"></i></a>
                            <a href="#"
                                class="w-10 h-10 rounded-full bg-slate-100 dark:bg-slate-800 flex items-center justify-center text-slate-600 dark:text-slate-300 hover:bg-slate-900 dark:hover:bg-black hover:text-white transition-colors border border-slate-200 dark:border-slate-700"
                                title="Sign in with Apple"><i class="fab fa-apple text-lg"></i></a>
                        </div>
                    </div>
                </form>

                <!-- Footer Links inside Card -->
                <div class="mt-10 pt-8 border-t border-slate-100 dark:border-slate-800/50 text-center relative z-10">
                    <p class="text-xs text-slate-500 dark:text-slate-400 whitespace-nowrap">
                        New to AllergyCare?
                        <a href="signup.html"
                            class="text-primary-600 dark:text-primary-400 font-bold hover:text-primary-500 dark:hover:text-primary-300 hover:underline decoration-2 underline-offset-4 ml-1">Create
                            an account</a>
                    </p>
                </div>
            </div>

            <!-- Additional Help Links -->
            <div class="mt-8 flex justify-center gap-6 text-sm font-medium text-slate-400 dark:text-slate-500">
                <a href="index.html" class="hover:text-primary-500 transition-colors">Back to Home</a>
                <span>&bull;</span>
                <a href="#" class="hover:text-primary-500 transition-colors">Patient Support</a>
                <span>&bull;</span>
                <a href="#" class="hover:text-primary-500 transition-colors">Emergency Info</a>
            </div>
        </div>
    </main>

    <script src="assets/js/main.js"></script>
</body>

</html>
